name: Reap Stale Jobs

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reap:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Trigger authenticated reaper
        env:
          WORKER_API_BASE: ${{ vars.WORKER_API_BASE }}
          MAINTENANCE_TOKEN: ${{ secrets.MAINTENANCE_TOKEN }}
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer $MAINTENANCE_TOKEN" \
            "$WORKER_API_BASE/api/maintenance/reap"
