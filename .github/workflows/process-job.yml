name: Process Garmin Footprints Job

on:
  workflow_dispatch:
    inputs:
      jobId:
        description: Worker job ID to process
        required: true
        type: string

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: process-${{ inputs.jobId }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install processor dependencies
        run: python -m pip install -r processor/requirements.txt

      - name: Process job
        env:
          JOB_ID: ${{ inputs.jobId }}
          WORKER_API_BASE: ${{ vars.WORKER_API_BASE }}
          PROCESSOR_TOKEN: ${{ secrets.PROCESSOR_TOKEN }}
        run: >-
          python processor/process_job.py
          --job-id "$JOB_ID"
          --api-base "$WORKER_API_BASE"
          --processor-token "$PROCESSOR_TOKEN"
          --template-dir template
