name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-python: true

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Install Python dependencies
        run: uv sync --locked

      - name: Quality checks
        run: npm run quality

      - name: Worker tests
        run: npm run test:worker

      - name: Processor tests
        run: npm run test:processor

      - name: End-to-end tests
        run: npm run test:e2e
