name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Install Python quality dependencies
        run: python -m pip install -r processor/requirements-dev.txt

      - name: Quality checks
        run: npm run quality

      - name: Worker tests
        run: npm run test:worker

      - name: Processor tests
        run: npm run test:processor

      - name: End-to-end tests
        run: npm run test:e2e
