name: OpenTofu Plan

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/infra-plan.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: "true"
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_cloudflare_zone_id: ${{ vars.CLOUDFLARE_ZONE_ID }}
      TF_VAR_github_owner: ${{ github.repository_owner }}
      TF_VAR_github_repository: ${{ github.event.repository.name }}
      TF_VAR_turnstile_site_key: ${{ vars.TURNSTILE_SITE_KEY }}
      TF_VAR_turnstile_secret_key: ${{ secrets.TURNSTILE_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.9.0"

      - name: Format check
        run: tofu fmt -check -recursive infra

      - name: Init without backend
        run: tofu -chdir=infra/prod init -backend=false

      - name: Validate
        run: tofu -chdir=infra/prod validate

      - name: Plan
        if: env.CLOUDFLARE_API_TOKEN != '' && env.GITHUB_TOKEN != ''
        run: tofu -chdir=infra/prod plan -no-color
